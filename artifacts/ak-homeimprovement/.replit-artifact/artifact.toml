kind = "web"
previewPath = "/"
title = "AK Home Improvement LLC"
version = "1.0.0"
id = "artifacts/ak-homeimprovement"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25278

[services.development]
run = "pnpm --filter @workspace/ak-homeimprovement run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ak-homeimprovement", "run", "build" ]
publicDir = "artifacts/ak-homeimprovement/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25278"
BASE_PATH = "/"
